services:
  mongo:
    image: mongo:7
    container_name: ezhuthidu-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ezhuthidu-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ezhuthidu-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/Ezhuthidu
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      ALLOWED_ORIGINS: "*"
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app

  frontend:
    image: ezhuthidu-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: ezhuthidu-frontend
    restart: unless-stopped
    networks:
      - app

  admin:
    image: ezhuthidu-admin:latest
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_BASE_PATH: /admin/
    container_name: ezhuthidu-admin
    restart: unless-stopped
    networks:
      - app

  gateway:
    image: nginx:alpine
    container_name: ezhuthidu-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mongo_data:
  backend_uploads:
